# NOTE: Example code is generated by Claude Opus 4.8
#
# Beam-driven plasma wakefield acceleration (PWFA), 3-D
#
# A dense, relativistic electron drive beam streams along +z through a uniform
# background electron plasma. The beam blows electrons out of its path and
# drives a trailing plasma wake -- a longitudinal accelerating field Ez that
# can reach gradients far beyond conventional RF cavities. A moving window
# travels with the beam at the speed of light so the simulation box tracks the
# wake instead of the lab frame.
#
# Geometry (3-D Cartesian; fields are labelled with the physical axes x, y, z):
#   x, y   transverse, [-200, +200] um, PERIODIC
#   z      longitudinal (beam/window direction), [-200, +200] um, 'open'
#   The drive beam starts at the head of the box (z in [-150, -100] um) and is
#   transversely narrow (x, y in [-20, +20] um); the plasma fills z >= 0.

grid:
  grid_type: Cartesian3DGrid
  number_of_cells: [64, 64, 64]
  lower_bound: [-200.0e-6, -200.0e-6, -200.0e-6]   # [xmin, ymin, zmin] meters
  upper_bound: [200.0e-6, 200.0e-6, 200.0e-6]      # [xmax, ymax, zmax] meters
  lower_boundary_conditions: [periodic, periodic, open]   # transverse periodic, z open
  upper_boundary_conditions: [periodic, periodic, open]
  lower_boundary_conditions_particles: [periodic, periodic, absorbing]
  upper_boundary_conditions_particles: [periodic, periodic, absorbing]
  moving_window_velocity: [0.0, 0.0, 299792458.0]  # follow the beam at c
  warpx_max_grid_size: 32

solver:
  solver_type: EM_Yee   # finite-difference time-domain electromagnetic (Yee)
  cfl: 1.0

simulation:
  max_steps: 10
  warpx_current_deposition_algo: esirkepov   # charge-conserving current deposition
  warpx_use_filter: 0                         # no current smoothing (matches source)

species:
  # Drive beam: dense, transversely narrow, relativistic bunch moving in +z.
  # directed_velocity is the PICMI proper velocity (gamma*beta*c) in m/s and may
  # exceed c -- copied exactly from the reference input.
  - particle_type: electron
    name: beam
    distribution-type: Uniform
    density: 1.0e23
    lower_bound: [-20.0e-6, -20.0e-6, -150.0e-6]
    upper_bound: [20.0e-6, 20.0e-6, -100.0e-6]
    directed_velocity: [0.0, 0.0, 1.0e9]   # proper velocity along +z [m/s]
    layout: Gridded
    n_macroparticle_per_cell: [2, 2, 1]

  # Background plasma: uniform cold electrons filling z >= 0, continuously
  # refilled as the moving window advances (fill_in).
  - particle_type: electron
    name: plasma
    distribution-type: Uniform
    density: 1.0e22
    lower_bound: [-200.0e-6, -200.0e-6, 0.0]
    upper_bound: [200.0e-6, 200.0e-6, null]   # open upper z bound
    fill_in: true
    layout: Gridded
    n_macroparticle_per_cell: [2, 2, 1]

diagnostics:
  # Field diagnostic: includes Ez so the longitudinal wakefield heatmap works.
  - diagnostic_type: Field
    name: diag_fields
    period: 10
    data_list: [Ex, Ey, Ez, Jx, Jy, Jz, part_per_cell]
  # Particle diagnostic: dumps both species for phase-space plots.
  - diagnostic_type: Particle
    name: diag1
    period: 10
    species: [beam, plasma]
    data_list: [ux, uy, uz, weighting]
