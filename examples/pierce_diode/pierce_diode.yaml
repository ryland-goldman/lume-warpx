# NOTE: Example code is generated by Claude Opus 4.8
#
# 1-D Pierce diode at the Child-Langmuir space-charge limit
#
# A classic Pierce diode: two parallel conducting plates 8 cm apart with a
# -93 kV difference across them. A potassium-ion beam is flux-injected from the
# cathode at the space-charge-limited current density predicted by the
# Child-Langmuir law, and the labframe electrostatic Multigrid (MLMG) solver
# self-consistently resolves the space-charge potential between the plates.
# This validates WarpX against the Child-Langmuir law.
#
# Geometry (1-D Cartesian; the only axis is the physical z, so the grid bounds
# and the plate potentials all use *_z):
#   z = 0      cathode  (phi = 0 V)
#   z = 0.08 m anode    (phi = -93 kV)
# The -93 kV anode accelerates the positive K+ ions across the 8 cm gap, so they
# arrive with ~93 keV of kinetic energy.

grid:
  grid_type: Cartesian1DGrid
  number_of_cells: [128]
  lower_bound: [0.0]                         # zmin [m]
  upper_bound: [0.08]                        # zmax [m] -> 8 cm plate separation
  lower_boundary_conditions: [dirichlet]     # conducting plates (PICMI 'dirichlet' -> WarpX PEC)
  upper_boundary_conditions: [dirichlet]
  lower_boundary_conditions_particles: [absorbing]
  upper_boundary_conditions_particles: [absorbing]
  warpx_potential_lo_z: 0.0                  # cathode potential [V]
  warpx_potential_hi_z: -93000.0             # anode potential [V] -> 93 kV gap

solver:
  solver_type: ES_MLMG_LF                    # labframe electrostatic, Multigrid (MLMG)

simulation:
  time_step_size: 3.6854047583914645e-10     # 0.4 * dz / v_final (transit-time CFL)
  max_steps: 5000
  particle_shape: 1

species:
  - name: ions                               # potassium ions (K+); explicit mass/charge
    distribution-type: UniformFlux           # continuous space-charge-limited injection
    mass: 6.476102368788e-26                 # 39 * m_u [kg]
    charge: 1.602176634e-19                  # +q_e [C]
    flux: 2.4211049148472014e20              # J_CL / q_e [particles / m^2 / s]
    flux_normal_axis: z                      # inject along the gap (z is the only axis)
    surface_flux_position: 0.0               # cathode plane at z = 0
    flux_direction: 1                         # inject in +z (toward the anode)
    rms_velocity: [0.0, 0.0, 0.0]            # cold beam (constant momentum distribution)
    layout: PseudoRandom                      # flux injection requires the PseudoRandom layout
    n_macroparticles_per_cell: 15

diagnostics:
  - diagnostic_type: Field
    name: diag_fields
    period: 500
    data_list: [phi, rho, Ez, jz]            # faithful to the source diagnostic
  - diagnostic_type: Particle                # ADDED beyond the source so we can plot the beam
    name: diag1
    period: 500
    species: [ions]
