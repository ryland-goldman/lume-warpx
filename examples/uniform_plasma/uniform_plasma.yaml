# NOTE: Example code is generated by Claude Opus 4.8
#
# Uniform hot thermal plasma (2D Cartesian, electromagnetic Yee FDTD)
#
# A spatially uniform, hot, collisionless electron plasma is initialized on a
# doubly-periodic 2D box and evolved with the second-order Yee FDTD solver. The
# electrons fill the domain at a constant density with an isotropic Gaussian
# thermal momentum spread (0.01c per component, i.e. a warm plasma); a
# neutralizing positive background is implied so the box stays globally neutral.
# With no drives, walls, or gradients this is a clean PIC benchmark: the plasma
# should remain statistically uniform, its small charge-density fluctuations
# oscillating near the plasma frequency.
#
# Geometry (2D Cartesian; WarpX names the in-plane axes x and z, and the 2nd
# grid bound below is that physical z):
#   x  in-plane transverse  (periodic)
#   z  in-plane longitudinal (periodic; the 2nd grid bound)

grid:
  grid_type: Cartesian2DGrid
  number_of_cells: [128, 128]
  lower_bound: [-20.0e-6, -20.0e-6]    # [xmin, zmin]  meters
  upper_bound: [20.0e-6, 20.0e-6]      # [xmax, zmax]  meters
  lower_boundary_conditions: [periodic, periodic]   # doubly-periodic box
  upper_boundary_conditions: [periodic, periodic]
  lower_boundary_conditions_particles: [periodic, periodic]
  upper_boundary_conditions_particles: [periodic, periodic]
  warpx_max_grid_size: 64
  warpx_blocking_factor: 32

solver:
  solver_type: EM_Yee                  # electromagnetic Yee FDTD
  cfl: 1.0                             # time step at the Courant limit

simulation:
  max_steps: 10                        # short benchmark run
  particle_shape: 1                    # linear (CIC) shape factor
  warpx_use_filter: 0                  # no current smoothing
  warpx_serialize_initial_conditions: 1   # reproducible particle initialization

species:
  - particle_type: electron
    name: electrons                    # standard name so beamphysics resolves mass for momentum plots
    distribution-type: Uniform
    density: 1.0e25                    # electrons per m^3
    rms_velocity: [2997924.58, 2997924.58, 2997924.58]   # isotropic Gaussian thermal spread = 0.01c per axis [m/s]
    layout: Gridded                    # one regular grid of macroparticles per cell
    n_macroparticle_per_cell: [2, 2]

diagnostics:
  - diagnostic_type: Field
    name: diag_fields
    period: 10                         # one dump at the final step
    data_list: [Ex, Ey, Ez, Bx, By, Bz, rho]   # rho + the E components for the field plots
  - diagnostic_type: Particle
    name: diag1
    period: 10
    species: [electrons]               # filter to the electron plasma (resolved to the Species object)
