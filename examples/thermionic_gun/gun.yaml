# NOTE: Example code is generated by Claude Opus 4.8
#
# 150 keV thermionic electron gun
#
# A planar diode: electrons are emitted thermionically from a hot cathode and
# accelerated across a 2 cm vacuum gap by a 150 kV bias. The self-consistent
# space-charge and self-magnetic fields are solved with the labframe
# electromagnetostatic Multigrid (MLMG) solver. Emission is pulsed for 20 ps.
#
# Geometry (2D Cartesian; WarpX names the in-plane axes x and z, and the 2nd
# grid bound below is that physical z, which is why the gap bias uses *_z):
#   z = 0      cathode  (phi = 0 V)
#   z = 0.02 m anode    (phi = 150 kV)  -> electrons gain 150 keV across the gap
#   x          transverse; PEC side walls enclose the diode
#
# The transverse walls are PEC (not periodic) on purpose: the magnetostatic
# vector-potential solve diverges with a periodic transverse boundary, but a
# fully PEC-enclosed diode is well-posed for the MLMG solver.

grid:
  grid_type: Cartesian2DGrid
  number_of_cells: [64, 128]
  lower_bound: [-0.01, 0.0]      # [xmin, zmin]  meters
  upper_bound: [0.01, 0.02]      # [xmax, zmax]  meters
  lower_boundary_conditions: [dirichlet, dirichlet]   # PEC electrodes / walls
  upper_boundary_conditions: [dirichlet, dirichlet]
  lower_boundary_conditions_particles: [absorbing, absorbing]
  upper_boundary_conditions_particles: [absorbing, absorbing]
  warpx_potential_lo_z: 0.0       # cathode potential [V]
  warpx_potential_hi_z: 150.0e3   # anode potential   [V]  -> 150 keV beam

solver:
  solver_type: ES_MLMG_EMS       # labframe electromagnetostatic, Multigrid (MLMG)
  required_precision: 1.0e-6
  warpx_magnetostatic_required_precision: 1.0e-6
  warpx_self_fields_verbosity: 0

simulation:
  time_step_size: 1.0e-12        # electrostatic/magnetostatic: no light-CFL limit
  max_time: 3.0e-10              # 20 ps pulse + ~200 ps for the beam to cross the gap
  particle_shape: 1

species:
  - particle_type: electron
    name: electron               # standard name so beamphysics resolves mass for energy/KE plots
    distribution-type: UniformFlux
    flux: 6.241509e23            # J / q_e for J = 1e5 A/m^2  [particles / m^2 / s]
    flux_normal_axis: z          # emit along the gap (2nd axis is physical z in 2D)
    surface_flux_position: 0.0   # cathode plane at z = 0
    flux_direction: 1            # inject in +z (toward the anode)
    flux_tmin: 0.0               # pulse start
    flux_tmax: 2.0e-11           # pulse end -> 20 ps pulse
    gaussian_flux_momentum_distribution: true
    rms_velocity: [1.5e5, 1.5e5, 1.5e5]   # ~1500 K cathode thermal spread [m/s]
    layout: PseudoRandom         # flux injection requires the PseudoRandom layout
    n_macroparticles_per_cell: 4
    initialize_self_field: false
    
diagnostics:
  - diagnostic_type: Particle
    name: diag1
    period: 30                   # dump every 30 ps -> 11 snapshots over the 300 ps run
    species: [electron]          # filter to the electron beam (resolved to the Species object)
  - diagnostic_type: Field
    name: diag_fields
    period: 30
    data_list: [phi, rho, Ex, Ez]
